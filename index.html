<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f7f3ef;
    --board-bg:     #d9cfc6;
    --cell-bg:      #e8e0d8;
    --text-dark:    #3a3028;
    --text-mid:     #7a6e65;
    --accent:       #e07a5f;
    --radius-board: 18px;
    --radius-tile:  12px;
    --gap:          12px;
    /* tile size computed once via JS and written as inline var */
    --tile-size:    80px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 16px 40px;
    color: var(--text-dark);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  /* ── Header ── */
  .header {
    width: min(96vw, 480px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .logo {
    font-size: 3rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -2px;
    line-height: 1;
  }

  .scores-wrap { display: flex; gap: 10px; align-items: center; }

  .score-box {
    background: var(--board-bg);
    border-radius: 10px;
    padding: 6px 16px;
    text-align: center;
    min-width: 70px;
  }
  .score-box .label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-mid);
    text-transform: uppercase;
  }
  .score-box .value {
    font-size: 1.3rem;
    font-weight: 800;
    color: var(--text-dark);
    line-height: 1.2;
  }

  /* ── Controls ── */
  .controls {
    width: min(96vw, 480px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .tagline { font-size: 0.82rem; color: var(--text-mid); font-weight: 600; }

  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 8px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.88rem;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-new:hover  { opacity: 0.88; }
  .btn-new:active { transform: scale(0.96); }

  /* ── Board ── */
  .board-wrap {
    position: relative;
    width: min(96vw, 480px);
  }

  .board {
    background: var(--board-bg);
    border-radius: var(--radius-board);
    padding: var(--gap);
    display: grid;
    grid-template-columns: repeat(4, var(--tile-size));
    grid-template-rows:    repeat(4, var(--tile-size));
    gap: var(--gap);
    box-shadow: 0 8px 32px rgba(58,48,40,.13), 0 2px 8px rgba(58,48,40,.08);
    width: fit-content;
    margin: 0 auto;
  }

  .cell {
    width:  var(--tile-size);
    height: var(--tile-size);
    background: var(--cell-bg);
    border-radius: var(--radius-tile);
  }

  /* ── Tile layer ── */
  .tiles-layer {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }

  .tile {
    position: absolute;
    width:  var(--tile-size);
    height: var(--tile-size);
    border-radius: var(--radius-tile);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    /* transitions handled via JS-assigned inline transition */
    will-change: left, top;
    z-index: 2;
    font-size: calc(var(--tile-size) * 0.38);
  }

  /* font-size scaling by digit count */
  .tile.fs-3 { font-size: calc(var(--tile-size) * 0.33); }  /* 128–512   */
  .tile.fs-4 { font-size: calc(var(--tile-size) * 0.27); }  /* 1024–9999 */
  .tile.fs-5 { font-size: calc(var(--tile-size) * 0.22); }  /* 10000+    */

  /* pop-in for new tiles */
  .tile.new-tile {
    animation: popIn 0.18s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  /* bounce for merged tiles */
  .tile.merge-tile {
    animation: mergePop 0.22s cubic-bezier(0.34,1.56,0.64,1) both;
    z-index: 3;
  }

  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  @keyframes mergePop {
    0%   { transform: scale(1);    }
    40%  { transform: scale(1.18); }
    70%  { transform: scale(0.95); }
    100% { transform: scale(1);    }
  }

  /* ── Tile colours ── */
  .t2    { background:#f9d7e0; color:#5c3d45; }
  .t4    { background:#ddd6f7; color:#3d3760; }
  .t8    { background:#fddccc; color:#6b3a25; }
  .t16   { background:#f4a08a; color:#5c2010; }
  .t32   { background:#f2845a; color:#fff;    }
  .t64   { background:#f5c842; color:#5c3d00; }
  .t128  { background:#7ecba1; color:#fff;    }
  .t256  { background:#6dbfea; color:#fff;    }
  .t512  { background:#9d74d4; color:#fff;    }
  .t1024 { background:#d4956a; color:#fff;    }
  .t2048 { background:#f0c040; color:#fff;
           box-shadow: 0 0 22px 4px rgba(240,192,64,.45); }
  .t-high{ background:#3a3028; color:#fff;    }

  /* ── Overlays ── */
  .overlay {
    display: none;
    position: absolute;
    inset: 0;
    border-radius: var(--radius-board);
    background: rgba(247,243,239,.82);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    gap: 14px;
    animation: fadeIn 0.3s ease;
  }
  .overlay.show { display: flex; }

  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

  .overlay h2 { font-size: 2rem; font-weight: 900; color: var(--text-dark); }
  .overlay p  { font-size: 0.9rem; color: var(--text-mid); font-weight: 600; }
  .overlay .btn-new { margin-top: 6px; padding: 10px 28px; font-size: 1rem; }

  /* confetti canvas */
  #confetti-canvas {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border-radius: var(--radius-board);
    pointer-events: none;
    z-index: 19;
  }

  /* score bump */
  .score-bump { animation: scoreBump 0.22s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes scoreBump {
    0%   { transform: scale(1);    }
    50%  { transform: scale(1.22); }
    100% { transform: scale(1);    }
  }

  /* ── Hint ── */
  .hint {
    margin-top: 22px;
    width: min(96vw, 480px);
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-mid);
    font-weight: 600;
  }
  .hint .keys {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .key {
    background: var(--board-bg);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-dark);
    border-bottom: 2px solid #c2b8b0;
  }

  .mobile-hint { display: none; }
  @media (hover: none) and (pointer: coarse) {
    .desktop-hint { display: none; }
    .mobile-hint  { display: block; }
  }

  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">2048</div>
  <div class="scores-wrap">
    <div class="score-box">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>
</div>

<div class="controls">
  <span class="tagline">Join the tiles, reach <strong>2048!</strong></span>
  <button class="btn-new" id="btn-new">New Game</button>
</div>

<div class="board-wrap" id="board-wrap">
  <div class="board" id="board"></div>
  <div class="tiles-layer" id="tiles-layer"></div>
  <canvas id="confetti-canvas"></canvas>

  <div class="overlay" id="overlay-win">
    <h2>🎉 You Win!</h2>
    <p>You reached 2048! Keep going?</p>
    <button class="btn-new" id="btn-continue">Keep Playing</button>
    <button class="btn-new" id="btn-restart-win" style="background:#a09088">New Game</button>
  </div>

  <div class="overlay" id="overlay-over">
    <h2>Game Over 😢</h2>
    <p>No moves left. Try again?</p>
    <button class="btn-new" id="btn-restart-over">New Game</button>
  </div>
</div>

<div class="hint desktop-hint">
  <div>Use keyboard or swipe to move tiles.</div>
  <div class="keys">
    <span class="key">↑</span><span class="key">↓</span>
    <span class="key">←</span><span class="key">→</span>
    &nbsp;or&nbsp;
    <span class="key">W</span><span class="key">A</span>
    <span class="key">S</span><span class="key">D</span>
  </div>
</div>
<div class="hint mobile-hint">Swipe in any direction to move tiles.</div>

<script>
(() => {
  'use strict';

  /* ─────────────────────────────────────────────
     CONSTANTS
  ───────────────────────────────────────────── */
  const SIZE       = 4;
  const TRANSITION = 110; // ms — slide animation duration

  /* ─────────────────────────────────────────────
     DOM REFS
  ───────────────────────────────────────────── */
  const boardEl     = document.getElementById('board');
  const tilesLayer  = document.getElementById('tiles-layer');
  const scoreEl     = document.getElementById('score');
  const bestEl      = document.getElementById('best');
  const overlayWin  = document.getElementById('overlay-win');
  const overlayOver = document.getElementById('overlay-over');
  const boardWrap   = document.getElementById('board-wrap');
  const confCanvas  = document.getElementById('confetti-canvas');
  const confCtx     = confCanvas.getContext('2d');

  /* ─────────────────────────────────────────────
     STATE
  ───────────────────────────────────────────── */
  let tileGrid = [];     // SIZE×SIZE of {id, value} | null
  let tileEls  = {};     // id → DOM element
  let nextId   = 1;
  let score    = 0;
  let best     = +localStorage.getItem('2048-best') || 0;
  let won      = false;
  let over     = false;
  let moving   = false;

  /* ─────────────────────────────────────────────
     TILE-SIZE & POSITIONING
     Read gap from CSS once; compute tileSize from
     the actual rendered cell — never hardcode.
  ───────────────────────────────────────────── */
  // Read --gap from CSS so JS never hardcodes 12
  function cssGap() {
    return parseInt(
      getComputedStyle(document.documentElement).getPropertyValue('--gap'),
      10
    );
  }

  // Returns the live pixel side-length of one tile cell
  function tileSize() {
    const cell = boardEl.querySelector('.cell');
    return cell ? cell.offsetWidth : 80;
  }

  // Pixel offsets of cell (row, col) relative to .board-wrap
  // Reads gap + tileSize fresh each call — correct after any resize
  function posFor(row, col) {
    const gap = cssGap();
    const ts  = tileSize();

    const boardRect = boardEl.getBoundingClientRect();
    const wrapRect  = boardWrap.getBoundingClientRect();
    const ox = boardRect.left - wrapRect.left;
    const oy = boardRect.top  - wrapRect.top;

    return {
      left: ox + gap + col * (ts + gap),
      top:  oy + gap + row * (ts + gap),
    };
  }

  /* ─────────────────────────────────────────────
     BUILD EMPTY CELL GRID
  ───────────────────────────────────────────── */
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
  }

  /* ─────────────────────────────────────────────
     TILE DOM HELPERS
  ───────────────────────────────────────────── */
  function colorClass(v) {
    return v <= 2048 ? 't' + v : 't-high';
  }

  function fontClass(v) {
    const d = String(v).length;
    if (d <= 2)  return '';
    if (d === 3) return 'fs-3';
    if (d === 4) return 'fs-4';
    return 'fs-5';
  }

  function createTileEl(id, value, row, col) {
    const el  = document.createElement('div');
    const pos = posFor(row, col);
    const ts  = tileSize();

    el.className   = `tile ${colorClass(value)} ${fontClass(value)}`;
    el.dataset.id  = id;
    el.textContent = value;
    el.style.width  = ts + 'px';
    el.style.height = ts + 'px';
    el.style.left   = pos.left + 'px';
    el.style.top    = pos.top  + 'px';
    // no transition yet — tile starts at its spawn position
    el.style.transition = 'none';

    tilesLayer.appendChild(el);
    tileEls[id] = el;
    return el;
  }

  // Slide a tile to a new grid position (animated)
  function moveTileEl(id, row, col) {
    const el = tileEls[id];
    if (!el) return;
    const pos = posFor(row, col);
    el.style.transition = `left ${TRANSITION}ms ease, top ${TRANSITION}ms ease`;
    el.style.left = pos.left + 'px';
    el.style.top  = pos.top  + 'px';
  }

  function removeTileEl(id) {
    const el = tileEls[id];
    if (el) { el.remove(); delete tileEls[id]; }
  }

  function updateTileEl(id, value) {
    const el = tileEls[id];
    if (!el) return;
    el.textContent = value;
    el.className   = `tile ${colorClass(value)} ${fontClass(value)} merge-tile`;
    el.style.transition = 'none';
  }

  /* ─────────────────────────────────────────────
     GRID HELPERS
  ───────────────────────────────────────────── */
  function emptyGrid() {
    return Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
  }

  function emptyCells() {
    const out = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (!tileGrid[r][c]) out.push([r, c]);
    return out;
  }

  function spawnTile() {
    const cells = emptyCells();
    if (!cells.length) return;
    const [r, c] = cells[Math.floor(Math.random() * cells.length)];
    const value  = Math.random() < 0.9 ? 2 : 4;
    const id     = nextId++;
    tileGrid[r][c] = { id, value };
    const el = createTileEl(id, value, r, c);
    // Force a reflow so the transition-less placement renders before
    // we add the animation class, preventing a flash.
    void el.offsetWidth;
    el.classList.add('new-tile');
  }

  /* ─────────────────────────────────────────────
     SCORE
  ───────────────────────────────────────────── */
  function addScore(n) {
    if (!n) return;
    score += n;
    scoreEl.textContent = score;
    scoreEl.classList.remove('score-bump');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('score-bump');
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('2048-best', best);
    }
  }

  /* ─────────────────────────────────────────────
     MOVE LOGIC
     shiftLeft: pure function that works on a
     snapshot of one row, never mutates input.
  ───────────────────────────────────────────── */

  // Accepts an array of SIZE tiles/nulls.
  // Returns { line: SIZE tiles/nulls, gained: number,
  //           removes: [id,...], merges: [id,...] }
  function shiftLeft(row) {
    // Pull out non-null tiles (preserve object identity)
    const vals = row.filter(Boolean);

    const out    = Array(SIZE).fill(null);
    let gained   = 0;
    const removes = [];
    const merges  = [];

    let wi = 0; // write index
    let ri = 0; // read index
    while (ri < vals.length) {
      if (ri + 1 < vals.length && vals[ri].value === vals[ri + 1].value) {
        const newVal = vals[ri].value * 2;
        gained += newVal;
        // The surviving tile keeps the id of the left/top tile
        out[wi] = { id: vals[ri].id, value: newVal };
        removes.push(vals[ri + 1].id);  // the right/bottom tile is absorbed
        merges.push(vals[ri].id);       // surviving tile needs visual update
        ri += 2;
      } else {
        out[wi] = { id: vals[ri].id, value: vals[ri].value };
        ri++;
      }
      wi++;
    }

    return { line: out, gained, removes, merges };
  }

  // Grid transformations (no mutation — return new arrays)
  function rotateRight(g) {
    return g[0].map((_, c) => g.map(row => row[c]).reverse());
  }
  function rotateLeft(g) {
    return g[0].map((_, c) => g.map(row => row[SIZE - 1 - c]));
  }
  function flipH(g) {
    return g.map(row => [...row].reverse());
  }

  function move(dir) {
    if (moving || over) return;

    // ── 1. Snapshot current grid for comparison ──────────────────
    // We detect "changed" BEFORE any mutation by comparing value
    // snapshots of the pre-transform and post-transform grids.

    let g = tileGrid.map(row => row.map(t => t ? { ...t } : null));

    // Rotate so the direction we want maps to "left"
    if (dir === 'right') g = flipH(g);
    if (dir === 'up')    g = rotateLeft(g);
    if (dir === 'down')  g = rotateRight(g);

    // Collect actions
    let totalGained = 0;
    let changed     = false;
    const allRemoves = [];
    const allMerges  = [];
    const newGrid    = emptyGrid();

    for (let r = 0; r < SIZE; r++) {
      const { line, gained, removes, merges } = shiftLeft(g[r]);

      // Detect change: compare old vs new value arrangement
      for (let c = 0; c < SIZE; c++) {
        const oldVal = g[r][c] ? g[r][c].value : 0;
        const newVal = line[c] ? line[c].value  : 0;
        // A merge counts as changed even if values happen to match
        // at the same index in some contrived board, because tiles moved.
        if (oldVal !== newVal || removes.length) changed = true;
      }

      totalGained += gained;
      allRemoves.push(...removes);
      allMerges.push(...merges);
      newGrid[r] = line;
    }

    // Reverse transforms on the new grid
    let finalGrid = newGrid;
    if (dir === 'right') finalGrid = flipH(finalGrid);
    if (dir === 'up')    finalGrid = rotateRight(finalGrid);
    if (dir === 'down')  finalGrid = rotateLeft(finalGrid);

    // ── 2. Did anything actually move? ───────────────────────────
    // More reliable check: compare tile IDs at each position
    if (!changed) {
      // Do a definitive positional check on the final vs current grid
      let reallyChanged = false;
      outer:
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++) {
          const a = tileGrid[r][c];
          const b = finalGrid[r][c];
          if ((a ? a.id : 0) !== (b ? b.id : 0)) { reallyChanged = true; break outer; }
        }
      if (!reallyChanged) return;
    }

    moving = true;

    // ── 3. Send absorbed (bottom) tiles behind the survivor ──────
    allRemoves.forEach(id => {
      const el = tileEls[id];
      if (el) el.style.zIndex = '1';
    });

    // ── 4. Slide all surviving tiles to their new positions ──────
    // Batch all getBoundingClientRect reads FIRST to avoid
    // repeated forced reflows.
    const positions = {};
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        const t = finalGrid[r][c];
        if (t) positions[t.id] = { r, c };
      }

    // Also slide the absorbed tiles to their merge destination
    allRemoves.forEach(id => {
      // Find where this id ended up in finalGrid (it was consumed)
      // so we slide it to the same cell as its merger partner.
      // We stored the survivor id in the same slot, so we match
      // by looking up the survivor that consumed it.
      // Easiest: slide it where the merge survivor went.
      // We can find this by searching allMerges positions.
    });

    // For removed tiles, slide them to the survivor's destination
    // by matching them via the shiftLeft result stored in merges.
    // We need to know which survivor consumed which removed tile.
    // Re-run shiftLeft to collect that mapping.
    const absorbedTo = {}; // removed_id → { r, c }

    {
      let gCheck = tileGrid.map(row => row.map(t => t ? { ...t } : null));
      if (dir === 'right') gCheck = flipH(gCheck);
      if (dir === 'up')    gCheck = rotateLeft(gCheck);
      if (dir === 'down')  gCheck = rotateRight(gCheck);

      for (let r = 0; r < SIZE; r++) {
        let ri = 0, wi = 0;
        const vals = gCheck[r].filter(Boolean);
        while (ri < vals.length) {
          if (ri + 1 < vals.length && vals[ri].value === vals[ri + 1].value) {
            // vals[ri+1] is absorbed into vals[ri], which lands at write-index wi in rotated space
            // We need the real-world r,c after un-rotating.
            // Rather than un-rotating the write-index, we just
            // record that the absorbed tile should go where the survivor goes.
            absorbedTo[vals[ri + 1].id] = vals[ri].id; // absorbed → survivor id
            ri += 2;
          } else {
            ri++;
          }
          wi++;
        }
      }
    }

    // Now slide absorbed tiles alongside their survivors
    Object.entries(absorbedTo).forEach(([absId, survivorId]) => {
      const pos = positions[survivorId];
      if (pos) moveTileEl(Number(absId), pos.r, pos.c);
    });

    // Slide all survivors
    Object.entries(positions).forEach(([id, { r, c }]) => {
      moveTileEl(Number(id), r, c);
    });

    // ── 5. After slide transition, update DOM ─────────────────────
    setTimeout(() => {
      // Remove absorbed tiles
      allRemoves.forEach(id => removeTileEl(id));

      // Update merged tiles (value + color + bounce animation)
      allMerges.forEach(id => {
        const pos = positions[id];
        if (!pos) return;
        const t = finalGrid[pos.r][pos.c];
        if (t) updateTileEl(id, t.value);
      });

      // Commit new grid
      tileGrid = finalGrid;

      // Score
      addScore(totalGained);

      // Win check (only trigger once)
      if (!won) {
        loop:
        for (let r = 0; r < SIZE; r++)
          for (let c = 0; c < SIZE; c++)
            if (tileGrid[r][c] && tileGrid[r][c].value >= 2048) {
              won = true;
              showWin();
              break loop;
            }
      }

      // Spawn new tile
      spawnTile();

      // Clean animation classes after they finish
      Object.values(tileEls).forEach(el => {
        el.addEventListener('animationend', () => {
          el.classList.remove('new-tile', 'merge-tile');
        }, { once: true });
      });

      // Game-over check
      if (!canMove()) {
        over = true;
        setTimeout(() => overlayOver.classList.add('show'), 350);
      }

      moving = false;
    }, TRANSITION + 20); // small buffer after CSS transition ends
  }

  /* ─────────────────────────────────────────────
     CAN MOVE?
  ───────────────────────────────────────────── */
  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (!tileGrid[r][c]) return true;
        const v = tileGrid[r][c].value;
        if (r + 1 < SIZE && tileGrid[r + 1][c] && tileGrid[r + 1][c].value === v) return true;
        if (c + 1 < SIZE && tileGrid[r][c + 1] && tileGrid[r][c + 1].value === v) return true;
      }
    }
    return false;
  }

  /* ─────────────────────────────────────────────
     INIT / RESTART
  ───────────────────────────────────────────── */
  function init() {
    tilesLayer.innerHTML = '';
    tileEls  = {};
    nextId   = 1;
    tileGrid = emptyGrid();
    score    = 0;
    won      = false;
    over     = false;
    moving   = false;

    scoreEl.textContent = 0;
    bestEl.textContent  = best;
    overlayWin.classList.remove('show');
    overlayOver.classList.remove('show');
    stopConfetti();

    // Spawn 2 starting tiles (no pop animation for cleanliness)
    spawnTile();
    spawnTile();
    Object.values(tileEls).forEach(el => el.classList.remove('new-tile'));
  }

  /* ─────────────────────────────────────────────
     WIN OVERLAY
  ───────────────────────────────────────────── */
  function showWin() {
    overlayWin.classList.add('show');
    startConfetti();
  }

  /* ─────────────────────────────────────────────
     CONFETTI
  ───────────────────────────────────────────── */
  let confettiRAF = null;
  let pieces      = [];
  const PALETTE   = ['#f9d7e0','#ddd6f7','#f5c842','#7ecba1','#6dbfea','#f2845a','#9d74d4'];

  function startConfetti() {
    const W = confCanvas.offsetWidth;
    const H = confCanvas.offsetHeight;
    confCanvas.width  = W;
    confCanvas.height = H;

    pieces = Array.from({ length: 80 }, () => ({
      x:      Math.random() * W,
      y:      Math.random() * H - H,
      r:      Math.random() * 6 + 4,
      vy:     Math.random() * 2 + 1,
      color:  PALETTE[Math.floor(Math.random() * PALETTE.length)],
      tilt:   Math.random() * 10 - 5,
      tiltV:  Math.random() * 0.3 + 0.1,
      angle:  Math.random() * Math.PI * 2,
      angleV: Math.random() * 0.08 + 0.02,
    }));

    (function loop() {
      confCtx.clearRect(0, 0, W, H);
      pieces.forEach(p => {
        p.y     += p.vy;
        p.angle += p.angleV;
        p.tilt  += p.tiltV;
        if (p.y > H) { p.y = -10; p.x = Math.random() * W; }
        confCtx.beginPath();
        confCtx.ellipse(p.x + p.tilt, p.y, p.r, p.r * 0.5, p.angle, 0, Math.PI * 2);
        confCtx.fillStyle = p.color;
        confCtx.fill();
      });
      confettiRAF = requestAnimationFrame(loop);
    })();
  }

  function stopConfetti() {
    if (confettiRAF) { cancelAnimationFrame(confettiRAF); confettiRAF = null; }
    confCtx.clearRect(0, 0, confCanvas.width, confCanvas.height);
    pieces = [];
  }

  /* ─────────────────────────────────────────────
     INPUT — KEYBOARD
  ───────────────────────────────────────────── */
  const KEY_MAP = {
    ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
    a:'left', d:'right', w:'up', s:'down',
    A:'left', D:'right', W:'up', S:'down',
  };

  document.addEventListener('keydown', e => {
    const dir = KEY_MAP[e.key];
    if (dir) { e.preventDefault(); move(dir); }
  });

  /* ─────────────────────────────────────────────
     INPUT — TOUCH / SWIPE
  ───────────────────────────────────────────── */
  let touchStartX = 0;
  let touchStartY = 0;

  boardWrap.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  boardWrap.addEventListener('touchend', e => {
    const dx    = e.changedTouches[0].clientX - touchStartX;
    const dy    = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx);
    const absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return; // too small → ignore
    move(absDx > absDy ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up'));
  }, { passive: true });

  /* ─────────────────────────────────────────────
     BUTTONS
  ───────────────────────────────────────────── */
  document.getElementById('btn-new').addEventListener('click', init);
  document.getElementById('btn-continue').addEventListener('click', () => {
    overlayWin.classList.remove('show');
    stopConfetti();
  });
  document.getElementById('btn-restart-win').addEventListener('click', init);
  document.getElementById('btn-restart-over').addEventListener('click', init);

  /* ─────────────────────────────────────────────
     RESIZE — reposition all tiles if window resizes
  ───────────────────────────────────────────── */
  window.addEventListener('resize', () => {
    const ts = tileSize();
    // Update --tile-size so CSS grid redraws cells
    document.documentElement.style.setProperty('--tile-size', ts + 'px');
    // Reposition every live tile
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++) {
        const t = tileGrid[r][c];
        if (!t) continue;
        const el  = tileEls[t.id];
        const pos = posFor(r, c);
        if (el) {
          el.style.transition = 'none';
          el.style.left  = pos.left + 'px';
          el.style.top   = pos.top  + 'px';
          el.style.width  = ts + 'px';
          el.style.height = ts + 'px';
        }
      }
  });

  /* ─────────────────────────────────────────────
     START
  ───────────────────────────────────────────── */
  init();
})();
</script>
</body>
</html>
