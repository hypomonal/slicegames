<!-- slicegames/games/minesweeper/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Minesweeper 💣 · SliceGames</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="back-btn" href="../../index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    SliceGames
  </a>

  <div class="topbar">
    <h1 class="title">Minesweeper 💣</h1>
    <button class="btn-icon" id="btn-restart" aria-label="Restart">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1.5 8a6.5 6.5 0 016.5-6.5 6.5 6.5 0 014.6 1.9M14.5 8a6.5 6.5 0 01-6.5 6.5 6.5 6.5 0 01-4.6-1.9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        <path d="M12.5 1v3h-3M3.5 15v-3h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- Stat bar -->
  <div class="stat-bar">
    <div class="stat-box"><div class="stat-lbl">💣 Mines</div><div class="stat-val" id="mines-left">0</div></div>
    <div class="stat-box"><div class="stat-lbl">⏱️ Time</div><div class="stat-val" id="timer">0s</div></div>
    <div class="stat-box"><div class="stat-lbl">🏆 Best</div><div class="stat-val" id="best">—</div></div>
  </div>

  <!-- Difficulty pills -->
  <div class="diff-pills">
    <button class="diff-pill active" data-diff="easy">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M4 8s.8 2 2.5 2S9 8 9 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="4.5" cy="5" r=".8" fill="currentColor"/><circle cx="8.5" cy="5" r=".8" fill="currentColor"/></svg>
      Easy 9×9
    </button>
    <button class="diff-pill" data-diff="medium">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M4 8h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="4.5" cy="5" r=".8" fill="currentColor"/><circle cx="8.5" cy="5" r=".8" fill="currentColor"/></svg>
      Medium 16×16
    </button>
    <button class="diff-pill" data-diff="hard">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M4.5 8.5s.5-1.5 2-1.5 2 1.5 2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><circle cx="4.5" cy="5" r=".8" fill="currentColor"/><circle cx="8.5" cy="5" r=".8" fill="currentColor"/></svg>
      Hard 16×30
    </button>
  </div>

  <!-- Board -->
  <div class="board-wrap" id="board-wrap">
    <table id="table"></table>
  </div>

  <!-- How to play -->
  <div class="howto">
    <div class="howto-title">📖 How to Play</div>
    <div class="howto-grid">
      <div class="howto-item"><div class="howto-icon">👆</div><div class="howto-text"><strong>Click / Tap</strong> to reveal a cell</div></div>
      <div class="howto-item"><div class="howto-icon">🚩</div><div class="howto-text"><strong>Right-click / Long-press</strong> to flag a mine</div></div>
      <div class="howto-item"><div class="howto-icon">🔢</div><div class="howto-text">Numbers show <strong>adjacent mines</strong></div></div>
      <div class="howto-item"><div class="howto-icon">💣</div><div class="howto-text"><strong>First click</strong> is always safe!</div></div>
      <div class="howto-item"><div class="howto-icon">⬜</div><div class="howto-text">Blank cells <strong>auto-expand</strong></div></div>
      <div class="howto-item"><div class="howto-icon">🏆</div><div class="howto-text">Reveal all safe cells to <strong>win!</strong></div></div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="result-overlay" id="result-overlay">
    <div class="result-card">
      <div class="result-icon" id="result-icon"></div>
      <h2 id="result-title">You Win!</h2>
      <p id="result-msg">Well played!</p>
      <button class="btn-primary" id="btn-play-again">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M1.5 7.5a6 6 0 016-6 6 6 0 014 1.5M13.5 7.5a6 6 0 01-6 6 6 6 0 01-4-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M11.5 1.5v3h-3M3.5 13.5v-3h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Play Again
      </button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
