<!-- slicegames/games/wordle/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wordle ✏️ · SliceGames</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="back-btn" href="../../index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    SliceGames
  </a>

  <div class="topbar">
    <h1 class="title">Wordle ✏️</h1>
    <div class="top-actions">
      <div class="streak-pill" id="streak-pill">🔥 <span id="streak">0</span></div>
      <button class="btn-icon" id="btn-new" aria-label="New word">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M1.5 8a6.5 6.5 0 016.5-6.5 6.5 6.5 0 014.6 1.9M14.5 8a6.5 6.5 0 01-6.5 6.5 6.5 6.5 0 01-4.6-1.9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M12.5 1v3h-3M3.5 15v-3h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="msg-bar" id="msg-bar"></div>

  <div class="grid" id="grid"></div>

  <div class="keyboard" id="keyboard"></div>

  <button class="btn-next" id="btn-next" style="display:none">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M1.5 8a6.5 6.5 0 016.5-6.5 6.5 6.5 0 014.6 1.9M14.5 8a6.5 6.5 0 01-6.5 6.5 6.5 6.5 0 01-4.6-1.9" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      <path d="M12.5 1v3h-3M3.5 15v-3h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Next Word 🎯
  </button>

  <!-- How to play legend -->
  <div class="legend">
    <div class="legend-title">💡 How to Play</div>
    <div class="legend-rows">
      <div class="legend-row">
        <div class="legend-tile correct">A</div>
        <span>Right letter, right spot ✅</span>
      </div>
      <div class="legend-row">
        <div class="legend-tile present">B</div>
        <span>Right letter, wrong spot 🟡</span>
      </div>
      <div class="legend-row">
        <div class="legend-tile absent">C</div>
        <span>Letter not in the word ❌</span>
      </div>
    </div>
    <p class="legend-note">Guess the 5-letter word in 6 tries. Type or tap! 🎮</p>
  </div>

  <script src="game.js"></script>
</body>
</html>
