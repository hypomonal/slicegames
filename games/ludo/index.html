<!-- slicegames/games/ludo/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ludo 🎲 · SliceGames</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <a class="back-btn" href="../../index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    SliceGames
  </a>

  <!-- MODE PICKER -->
  <div class="mode-screen" id="mode-screen">
    <div class="mode-logo">🎲</div>
    <h1 class="mode-title">Ludo</h1>
    <p class="mode-sub">Choose your game mode!</p>
    <div class="mode-grid">
      <button class="mode-btn" data-mode="1v1-human">
        <span class="mode-icon">🧑‍🤝‍🧑</span>
        <span class="mode-name">1 v 1</span>
        <span class="mode-desc">2 Human Players</span>
      </button>
      <button class="mode-btn" data-mode="1v1-cpu">
        <span class="mode-icon">🤖</span>
        <span class="mode-name">vs CPU</span>
        <span class="mode-desc">You vs Computer</span>
      </button>
      <button class="mode-btn" data-mode="3-human">
        <span class="mode-icon">👥</span>
        <span class="mode-name">3 Players</span>
        <span class="mode-desc">3 Human Players</span>
      </button>
      <button class="mode-btn" data-mode="4-human">
        <span class="mode-icon">👨‍👩‍👧‍👦</span>
        <span class="mode-name">4 Players</span>
        <span class="mode-desc">4 Human Players</span>
      </button>
      <button class="mode-btn" data-mode="2v2-cpu">
        <span class="mode-icon">🤝</span>
        <span class="mode-name">2 vs 2 CPU</span>
        <span class="mode-desc">2 Human + 2 CPU</span>
      </button>
      <button class="mode-btn" data-mode="1v3-cpu">
        <span class="mode-icon">💪</span>
        <span class="mode-name">1 vs 3 CPU</span>
        <span class="mode-desc">Solo vs 3 Computers</span>
      </button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="game-screen" id="game-screen" style="display:none">

    <div class="game-topbar">
      <button class="back-to-menu" id="btn-menu">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Menu
      </button>
      <h1 class="game-title">🎲 Ludo</h1>
      <button class="btn-icon-sm" id="btn-restart">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path d="M1.5 7.5a6 6 0 016-6 6 6 0 014 1.5M13.5 7.5a6 6 0 01-6 6 6 6 0 01-4-1.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M11.5 1.5v3h-3M3.5 13.5v-3h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <!-- 4-corner dice layout -->
    <div class="arena" id="arena">

      <!-- Red dice — top left -->
      <div class="dice-zone dz-tl" id="dz-red">
        <div class="dz-label" id="lbl-red">🔴 Red</div>
        <div class="dz-face" id="df-red" role="button" aria-label="Roll Red dice">
          <svg id="dsv-red" width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="2" y="2" width="40" height="40" rx="8" fill="rgba(255,255,255,.07)" stroke="rgba(248,113,113,.5)" stroke-width="1.8"/>
            <circle cx="22" cy="22" r="4" fill="#f87171"/>
          </svg>
        </div>
        <div class="dz-status" id="dst-red">Waiting…</div>
      </div>

      <!-- Blue dice — top right -->
      <div class="dice-zone dz-tr" id="dz-blue">
        <div class="dz-label" id="lbl-blue">🔵 Blue</div>
        <div class="dz-face" id="df-blue" role="button" aria-label="Roll Blue dice">
          <svg id="dsv-blue" width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="2" y="2" width="40" height="40" rx="8" fill="rgba(255,255,255,.07)" stroke="rgba(96,165,250,.5)" stroke-width="1.8"/>
            <circle cx="22" cy="22" r="4" fill="#60a5fa"/>
          </svg>
        </div>
        <div class="dz-status" id="dst-blue">Waiting…</div>
      </div>

      <!-- Green dice — bottom right -->
      <div class="dice-zone dz-br" id="dz-green">
        <div class="dz-label" id="lbl-green">🟢 Green</div>
        <div class="dz-face" id="df-green" role="button" aria-label="Roll Green dice">
          <svg id="dsv-green" width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="2" y="2" width="40" height="40" rx="8" fill="rgba(255,255,255,.07)" stroke="rgba(74,222,128,.5)" stroke-width="1.8"/>
            <circle cx="22" cy="22" r="4" fill="#4ade80"/>
          </svg>
        </div>
        <div class="dz-status" id="dst-green">Waiting…</div>
      </div>

      <!-- Yellow dice — bottom left -->
      <div class="dice-zone dz-bl" id="dz-yellow">
        <div class="dz-label" id="lbl-yellow">🟡 Yellow</div>
        <div class="dz-face" id="df-yellow" role="button" aria-label="Roll Yellow dice">
          <svg id="dsv-yellow" width="44" height="44" viewBox="0 0 44 44" fill="none">
            <rect x="2" y="2" width="40" height="40" rx="8" fill="rgba(255,255,255,.07)" stroke="rgba(251,191,36,.5)" stroke-width="1.8"/>
            <circle cx="22" cy="22" r="4" fill="#fbbf24"/>
          </svg>
        </div>
        <div class="dz-status" id="dst-yellow">Waiting…</div>
      </div>

      <!-- Board canvas -->
      <div class="board-wrap">
        <canvas id="board-canvas"></canvas>
      </div>
    </div>

    <!-- Log -->
    <div class="log-box" id="log-box">
      <span id="log-text">🎲 Game starting…</span>
    </div>

  </div>

  <!-- WIN OVERLAY -->
  <div class="win-overlay" id="win-overlay">
    <div class="win-card">
      <div class="win-big" id="win-big">🎉</div>
      <h2 id="win-title">Red Wins!</h2>
      <p id="win-sub">All pieces made it home! 🏁</p>
      <button class="btn-primary" id="btn-win-menu">Back to Menu</button>
      <button class="btn-secondary" id="btn-win-restart">Play Again 🔄</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
